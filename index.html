<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1830" />
    <!-- iOS ignora o manifest; precisa destas tags para instalar como app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RARO" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>RARO Home — Sistema de Gestão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', -apple-system, sans-serif; background: #F7F6F3; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Autorrecuperação de tela branca por cache velho de PWA.
      // Se um módulo não carrega (bundle antigo servido por SW após deploy),
      // desregistra o service worker, limpa caches e recarrega UMA vez.
      window.addEventListener('error', function (e) {
        var alvo = e && e.target;
        var ehModulo = alvo && (alvo.tagName === 'SCRIPT' || alvo.tagName === 'LINK');
        if (!ehModulo) return;
        if (sessionStorage.getItem('raro_sw_reboot')) return; // evita loop
        sessionStorage.setItem('raro_sw_reboot', '1');
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (rs) {
              rs.forEach(function (r) { r.unregister(); });
            });
          }
          if (window.caches && caches.keys) {
            caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); });
          }
        } finally {
          setTimeout(function () { location.reload(); }, 300);
        }
      }, true);
      // limpa o flag quando a app sobe de verdade
      window.addEventListener('load', function () {
        setTimeout(function () { sessionStorage.removeItem('raro_sw_reboot'); }, 4000);
      });
    </script>
  </body>
</html>
