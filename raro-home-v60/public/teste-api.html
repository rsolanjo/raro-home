<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Teste API — RARO Home</title>
<style>body{font-family:system-ui;max-width:640px;margin:40px auto;padding:20px}
button{background:#0EA5E9;color:#fff;border:none;padding:12px 24px;border-radius:6px;font-size:15px;cursor:pointer;margin:4px}
pre{background:#f4f4f4;padding:16px;border-radius:6px;white-space:pre-wrap;word-break:break-word;font-size:13px}
.ok{color:#16a34a}.err{color:#dc2626}</style></head>
<body>
<h1>🔧 Diagnóstico API RARO Home</h1>
<button onclick="listar()">1. Listar modelos disponíveis</button>
<button onclick="testar()">2. Testar conversa</button>
<pre id="out">Clique em "Listar modelos" primeiro...</pre>
<script>
async function listar() {
  const out = document.getElementById('out')
  out.textContent = '⏳ Buscando modelos disponíveis na sua conta...'
  try {
    const r = await fetch('/api/claude?listModels=1', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({listModels:true}) })
    const text = await r.text()
    try {
      const data = JSON.parse(text)
      if (data.data) {
        out.innerHTML = '<span class="ok">✅ Modelos disponíveis na sua conta:</span>\n\n' + data.data.map(m=>'• '+m.id).join('\n') + '\n\nUse um destes nomes no app.'
      } else {
        out.textContent = 'Status ' + r.status + '\n\n' + text
      }
    } catch(e) { out.textContent = 'Status ' + r.status + '\n\n' + text }
  } catch(e) { out.innerHTML = '<span class="err">❌ '+e.message+'</span>' }
}
async function testar() {
  const out = document.getElementById('out')
  out.textContent = '⏳ Testando conversa...'
  try {
    const r = await fetch('/api/claude', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ max_tokens:100, messages:[{role:'user',content:'Responda: OK'}] }) })
    const text = await r.text()
    const data = JSON.parse(text)
    if (data.content) out.innerHTML = '<span class="ok">✅ FUNCIONANDO: '+data.content[0].text+'</span>'
    else out.innerHTML = '<span class="err">❌ '+JSON.stringify(data,null,2)+'</span>'
  } catch(e) { out.innerHTML = '<span class="err">❌ '+e.message+'</span>' }
}
</script>
</body>
</html>
